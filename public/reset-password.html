<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resetare Parolă - MEGA TRUCKING TIMIȘOARA</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0A192F 0%, #1E3A8A 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .reset-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        
        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
        }
        
        h1 {
            color: #0A192F;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }
        
        p {
            color: #6B7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fff;
            color: #000000 !important;
        }
        
        .form-group input::placeholder {
            color: #6B7280 !important;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3B82F6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            color: #000000 !important;
        }
        
        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }
        
        .btn-secondary {
            background: #F3F4F6;
            color: #374151;
            margin-top: 10px;
        }
        
        .btn-secondary:hover {
            background: #E5E7EB;
        }
        
        .reset-message {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .reset-message.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }
        
        .reset-message.error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }
        
        .back-link {
            color: #3B82F6;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            display: inline-block;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="logo">
            <i class="fas fa-truck"></i>
        </div>
        
        <h1 id="pageTitle">Resetează Parola</h1>
        <p id="pageDescription">Introdu adresa de email pentru a primi link-ul de resetare.</p>
        
        <div id="message" class="reset-message"></div>
        
        <form id="resetForm">
            <div class="form-group">
                <label for="email">Adresa de Email</label>
                <input type="email" id="email" name="email" required placeholder="Introdu adresa de email">
            </div>
            
            <div class="form-group hidden" id="passwordGroup">
                <label for="password">Parola Nouă</label>
                <input type="password" id="password" name="password" minlength="6" placeholder="Introdu parola nouă">
            </div>
            
            <div class="form-group hidden" id="confirmPasswordGroup">
                <label for="confirmPassword">Confirmă Parola</label>
                <input type="password" id="confirmPassword" name="confirmPassword" minlength="6" placeholder="Confirmă parola nouă">
            </div>
            
            <button type="submit" class="btn btn-primary" id="submitButton">Trimite Link de Resetare</button>
        </form>
        
        <a href="/" class="back-link">
            <i class="fas fa-arrow-left"></i> Înapoi la Login
        </a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('resetForm');
            const message = document.getElementById('message');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const passwordGroup = document.getElementById('passwordGroup');
            const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
            const submitButton = document.getElementById('submitButton');
            const pageTitle = document.getElementById('pageTitle');
            const pageDescription = document.getElementById('pageDescription');
            
            // Verifică dacă există token în URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            
            if (token) {
                // Mod resetare parolă cu token
                showResetPasswordForm(token);
            } else {
                // Mod solicitare resetare parolă
                showForgotPasswordForm();
            }
            
            function showForgotPasswordForm() {
                // Placeholder generic pentru securitate
                emailInput.placeholder = 'Introdu adresa de email';
                passwordGroup.classList.add('hidden');
                confirmPasswordGroup.classList.add('hidden');
                submitButton.textContent = 'Trimite Link de Resetare';
                
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const email = emailInput.value.trim();
                    
                    if (!email) {
                        showMessage('Te rog introdu adresa de email.', 'error');
                        return;
                    }
                    
                    try {
                        const response = await fetch('/api/auth/forgot-password', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ email: email })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            message.className = 'reset-message success';
                            
                            if (data.resetLink) {
                                // Afișează link-ul direct pentru testare
                                message.innerHTML = `
                                    <i class="fas fa-link"></i><br>
                                    <strong>Link de resetare generat!</strong><br>
                                    <small>Email nu poate fi trimis - folosește link-ul de mai jos:</small><br>
                                    <a href="${data.resetLink}" style="color: #3B82F6; text-decoration: underline; word-break: break-all;">
                                        ${data.resetLink}
                                    </a><br>
                                    <small style="color: #6B7280;">Copiază link-ul în browser pentru a reseta parola.</small>
                                `;
                            } else {
                                // Email trimis cu succes
                                message.innerHTML = `
                                    <i class="fas fa-check-circle"></i><br>
                                    <strong>Email trimis cu succes!</strong><br>
                                    <small>Verifică-ți inbox-ul pentru link-ul de resetare.</small><br>
                                    <small>Dacă nu găsești email-ul, verifică și folderul Spam.</small>
                                `;
                            }
                            
                            message.style.display = 'block';
                            
                            // Ascunde formularul după trimiterea cu succes
                            form.style.display = 'none';
                        } else {
                            showMessage(data.message || 'A apărut o eroare.', 'error');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        showMessage('A apărut o eroare la trimiterea cererii.', 'error');
                    }
                });
            }
            
            function showResetPasswordForm(token) {
                // Verifică token-ul
                verifyToken(token);
                
                // Schimbă formularul pentru resetare parolă
                pageTitle.textContent = 'Resetează Parola';
                pageDescription.textContent = 'Introdu noua parolă pentru contul tău.';
                emailInput.style.display = 'none';
                passwordGroup.classList.remove('hidden');
                confirmPasswordGroup.classList.remove('hidden');
                submitButton.textContent = 'Resetează Parola';
                
                form.addEventListener('submit', async function(e) {
                    e.preventDefault();
                    
                    const newPassword = passwordInput.value;
                    const confirmPassword = confirmPasswordInput.value;
                    
                    if (!newPassword || !confirmPassword) {
                        showMessage('Te rog completează toate câmpurile.', 'error');
                        return;
                    }
                    
                    if (newPassword.length < 6) {
                        showMessage('Parola trebuie să aibă cel puțin 6 caractere.', 'error');
                        return;
                    }
                    
                    if (newPassword !== confirmPassword) {
                        showMessage('Parolele nu se potrivesc.', 'error');
                        return;
                    }
                    
                    try {
                        const response = await fetch('/api/auth/reset-password', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ 
                                token: token,
                                newPassword: newPassword 
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (data.success) {
                            message.className = 'reset-message success';
                            message.innerHTML = `
                                <i class="fas fa-check-circle"></i><br>
                                <strong>Parola a fost resetată cu succes!</strong><br>
                                <small>Poți să te loghezi cu noua parolă.</small><br>
                                <a href="/" style="color: #3B82F6; text-decoration: underline;">Înapoi la login</a>
                            `;
                            message.style.display = 'block';
                            form.style.display = 'none';
                        } else {
                            showMessage(data.message || 'A apărut o eroare.', 'error');
                        }
                    } catch (error) {
                        console.error('Error:', error);
                        showMessage('A apărut o eroare la resetarea parolei.', 'error');
                    }
                });
            }
            
            async function verifyToken(token) {
                try {
                    const response = await fetch(`/api/auth/verify-reset-token/${token}`);
                    const data = await response.json();
                    
                    if (!data.success) {
                        message.className = 'reset-message error';
                        message.innerHTML = `
                            <i class="fas fa-exclamation-triangle"></i><br>
                            <strong>Token invalid sau expirat!</strong><br>
                            <small>${data.message}</small><br>
                            <a href="/reset-password.html" style="color: #3B82F6; text-decoration: underline;">Solicită un nou link</a>
                        `;
                        message.style.display = 'block';
                        form.style.display = 'none';
                    }
                } catch (error) {
                    console.error('Error verifying token:', error);
                    showMessage('A apărut o eroare la verificarea token-ului.', 'error');
                }
            }
            
            function showMessage(text, type) {
                message.className = `reset-message ${type}`;
                message.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-triangle' : 'check-circle'}"></i><br>${text}`;
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
